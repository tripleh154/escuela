name: Python Autotests CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala Python en el servidor de GitHub
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # O la versión que uses

      # 3. Instala dependencias
      # Si tienes un archivo requirements.txt, úsalo. 
      # Si no, instalamos pytest directamente.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest 

      # 4. Ejecuta las pruebas
      # Esto buscará automáticamente archivos que empiecen por test_*.py
      - name: Run tests with pytest
        run: pytest